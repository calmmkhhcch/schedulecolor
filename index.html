<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>班表小助手 - 智慧班表管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        body { background-color: #f5f7ff; font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; padding-top: 20px; padding-bottom: 50px; user-select: none; }
        .card { border-radius: 15px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.08); margin-bottom: 25px; overflow: hidden; }
        .upload-area { text-align: center; padding: 40px 20px; border: 2px dashed #4361ee; border-radius: 12px; background-color: #f8faff; cursor: pointer; transition: all 0.3s ease; }
        .file-input-hidden { display: none; }
        #selectFileBtn { background-color: #4361ee; border-color: #4361ee; padding: 12px 30px; border-radius: 10px; }
        .file-btn-text { color: #000000 !important; font-weight: 700 !important; }
        .file-info, .error-message { padding: 10px 15px; border-radius: 8px; margin-top: 15px; }
        .file-info { background-color: #e8f5e8; border-left: 4px solid #28a745; }
        .error-message { background-color: #ffe6e6; color: #dc3545; border-left: 4px solid #dc3545; }
        .loading-spinner { display: none; text-align: center; padding: 40px; background: white; border-radius: 15px; margin: 20px 0; }
        .result-section { display: none; }
        .person-selector { background-color: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); margin-bottom: 25px; }
        .person-selector select { border-radius: 10px; border: 2px solid #e0e0e0; padding: 12px 20px; font-size: 1.1rem; }
        .person-info-card { background-color: #f8faff; padding: 20px; border-radius: 12px; border-left: 5px solid #4361ee; margin-bottom: 25px; }
        .weekly-calendar { background-color: white; border-radius: 15px; overflow-x: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.08); margin-bottom: 25px; }
        .weekly-calendar-table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 700px; }
        .weekly-calendar-header { background-color: #4361ee; color: white; }
        .weekday-header { padding: 15px 5px; text-align: center; width: 14.2857%; border-right: 1px solid rgba(255,255,255,0.2); }
        .day-cell { background-color: #f8f9fa; padding: 8px 5px; height: 120px; vertical-align: top; text-align: center; border: 1px solid #eaeaea; cursor: pointer; transition: all 0.2s; }
        .day-cell:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); background-color: #fff6e5; }
        .day-cell.today { border: 2px solid #ff6b6b; background-color: #fff5f5; }
        .day-date { font-size: 1.4rem; font-weight: 700; color: #333; margin-bottom: 5px; }
        .day-shift { font-size: 1.1rem; font-weight: 600; margin-bottom: 5px; word-break: break-word; }
        .day-shift-time { font-size: 0.75rem; color: #666; }
        .shift-summary-section { background-color: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); margin-bottom: 25px; }
        .summary-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; margin-bottom: 15px; }
        .summary-content { max-height: 600px; overflow-y: auto; transition: max-height 0.3s; }
        .summary-content.collapsed { max-height: 0; overflow: hidden; }
        .summary-item { display: flex; justify-content: space-between; padding: 10px 15px; margin-bottom: 6px; background-color: #f8f9fa; border-radius: 8px; border-left: 4px solid #4361ee; }
        .shift-divider-red { border-top: 3px solid #ff4d4d; margin: 12px 0; width: 100%; }
        .color-settings-section { background-color: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); margin-bottom: 25px; }
        .color-setting-item { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; padding: 12px 15px; margin-bottom: 8px; background-color: #f8f9fa; border-radius: 8px; }
        .shift-label { min-width: 55px; font-weight: 600; }
        .time-label { flex: 2; font-size: 0.85rem; color: #555; }
        .color-preview { width: 40px; height: 40px; border-radius: 6px; border: 2px solid #ddd; cursor: pointer; }
        .color-input-group { display: flex; gap: 8px; }
        .color-input { width: 65px; text-align: center; }
        .action-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .action-btn { padding: 10px 24px; border-radius: 10px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
        .copy-notification, .download-notification { position: fixed; bottom: 30px; right: 30px; background-color: #28a745; color: white; padding: 12px 20px; border-radius: 10px; z-index: 1000; opacity: 0; transform: translateY(20px); transition: all 0.3s; }
        .copy-notification.show, .download-notification.show { opacity: 1; transform: translateY(0); }
        @media (max-width: 768px) { .day-cell { height: 90px; } .day-date { font-size: 1.1rem; } .day-shift { font-size: 0.9rem; } }
        .modal-custom-shift { font-size: 0.9rem; }
        .shift-option-btn { margin: 4px; padding: 6px 12px; }
        .red-divider-list { border-bottom: 2px solid #ff0000; margin: 8px 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="text-center mb-4"><h1 class="fw-bold text-primary"><i class="bi bi-calendar-check"></i> 班表小助手</h1><p class="text-muted">上傳Excel班表，查詢人員整月班表．點擊日期即可修改班型</p></div>
    <div class="card"><div class="card-body"><h5 class="card-title"><i class="bi bi-upload"></i> 上傳班表檔案</h5>
        <div class="upload-area" id="uploadArea"><div><i class="bi bi-file-earmark-excel" style="font-size: 4rem; color: #4361ee;"></i></div>
        <h4 class="upload-instruction">點擊選擇檔案 上傳班表</h4><p class="text-muted">支援 .xlsx / .xls</p>
        <input type="file" id="fileInput" class="file-input-hidden" accept=".xlsx,.xls,.xlsm">
        <button class="btn btn-primary btn-lg" id="selectFileBtn"><i class="bi bi-folder2-open"></i> <span class="file-btn-text">選擇檔案</span></button>
        <div id="fileInfo" class="file-info mt-3" style="display: none;"><i class="bi bi-check-circle text-success"></i><span id="fileName"></span></div>
        <div id="errorMessage" class="error-message" style="display: none;"></div></div>
    </div></div>
    <div class="loading-spinner" id="loadingSpinner"><div class="spinner-border text-primary"><span class="visually-hidden">載入中...</span></div><h4 class="mt-3">解析班表中...</h4></div>
    <div class="result-section" id="resultSection">
        <div class="color-settings-section" id="colorSettingsSection" style="display: none;">
            <div class="d-flex justify-content-between"><h5><i class="bi bi-palette"></i> 班型顏色設定</h5><button class="btn btn-sm btn-outline-secondary" id="toggleColorSettingsBtn"><i class="bi bi-chevron-up"></i> 隱藏</button></div>
            <div id="colorSettingsContainer"></div>
            <div class="mt-2"><button class="btn btn-primary btn-sm" id="saveColorsBtn">儲存</button><button class="btn btn-secondary btn-sm" id="resetColorsBtn">重設預設</button></div>
        </div>
        <div class="week-start-selector mt-2" id="weekStartSelector" style="display: none;"><label>每週第一天</label><select class="form-select w-50" id="weekStartDaySelect"><option value="1">週一</option><option value="0">週日</option></select></div>
        <div class="person-selector"><h5><i class="bi bi-person-search"></i> 選擇人員</h5><select class="form-select form-select-lg" id="personSelect"><option value="">請選擇人員</option></select><div class="d-flex justify-content-between mt-3 flex-wrap gap-2"><button class="btn btn-outline-secondary" id="reuploadBtn"><i class="bi bi-arrow-clockwise"></i> 重新上載</button><button class="btn btn-outline-primary" id="toggleColorSettingsBtn2"><i class="bi bi-palette"></i> 顏色設定</button><button class="btn btn-outline-danger" id="clearStorageBtn"><i class="bi bi-trash"></i> 清除資料</button></div></div>
        <div class="card mt-3"><div class="card-body"><div id="selectedPersonInfo" class="alert alert-info" style="display: none;"></div><div id="personInfoCard" class="person-info-card" style="display: none;"><div class="row"><div class="col-md-8"><h4 id="personNameDisplay"></h4><span id="personCategoryDisplay" class="badge bg-secondary"></span><span id="monthDisplay" class="badge bg-primary ms-2"></span></div><div class="col-md-4 text-md-end"><button class="btn btn-primary" id="copyPersonScheduleBtn"><i class="bi bi-clipboard"></i> 複製班表</button></div></div></div>
            <div id="personWeeklyCalendar" class="weekly-calendar" style="display: none;"><table class="weekly-calendar-table"><thead id="weekHeader" class="weekly-calendar-header"></thead><tbody id="weeklyCalendarBody"></tbody></table></div>
            <div id="personShiftSummary" class="shift-summary-section" style="display: none;"><div class="summary-header" id="summaryToggleBtn"><h5 class="summary-title"><i class="bi bi-bar-chart"></i> 班表統計</h5><button class="btn summary-toggle"><i class="bi bi-chevron-down"></i></button></div><div class="summary-content collapsed" id="shiftSummaryContent"></div></div>
            <div class="action-buttons" id="actionButtons" style="display: none;"><button class="btn btn-success action-btn" id="downloadImageBtn"><i class="bi bi-image"></i> 下載圖片</button><button class="btn btn-primary action-btn" id="copyPersonScheduleBtn2"><i class="bi bi-clipboard"></i> 複製班表</button></div>
        </div></div>
    </div>
</div>
<div class="copy-notification" id="copyNotification"><i class="bi bi-check-circle"></i> 已複製</div>
<div class="download-notification" id="downloadNotification"><i class="bi bi-check-circle"></i> 下載中...</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
    // ---------- 班型描述與時間排序 ----------
    const shiftDescriptions = {
        'K0': '05:00 ~ 13:00', 'M': '05:30 ~ 13:30', 'M1': '06:00 ~ 14:00', 'M2': '06:30 ~ 14:30', 'M3': '07:00 ~ 15:00',
        'D': '08:00 ~ 16:00', 'D4': '08:00 ~ 16:30', 'D5': '09:00 ~ 17:00', 'D2': '10:00 ~ 18:00', 'D6': '12:00 ~ 20:00',
        'K2': '14:00 ~ 22:00', 'N': '16:00 ~ 24:00', 'K5': '21:00 ~ 05:00', 'K6': '22:00 ~ 06:00',
        'Z': '例休日', 'R': '休假日', 'GBL': '國定補休', 'L': '國內補休', 'A': '特休假', '公': '公假', '福': '福利假', '體檢': '體檢假'
    };
    const holidayShifts = ['Z','R','GBL','L','A','公','福','體檢'];
    // 預設顏色 (依照需求)
    const defaultShiftColors = {
        'K0':{r:255,g:255,b:102}, 'M':{r:255,g:255,b:102}, 'M1':{r:255,g:255,b:102}, 'M2':{r:255,g:255,b:102}, 'M3':{r:255,g:255,b:102},
        'D':{r:255,g:107,b:107}, 'D2':{r:255,g:107,b:107}, 'D4':{r:255,g:107,b:107}, 'D5':{r:255,g:107,b:107}, 'D6':{r:255,g:107,b:107},
        'K2':{r:153,g:153,b:255}, 'K5':{r:153,g:153,b:255}, 'K6':{r:153,g:153,b:255}, 'N':{r:153,g:153,b:255},
        'Z':{r:204,g:255,b:229}, 'R':{r:204,g:255,b:229}, 'GBL':{r:204,g:255,b:229}, 'L':{r:204,g:255,b:229},
        'A':{r:204,g:255,b:229}, '公':{r:204,g:255,b:229}, '福':{r:204,g:255,b:229}, '體檢':{r:204,g:255,b:229}
    };
    // 特殊班型預設粉紅色
    const SPECIAL_DEFAULT_COLOR = { r: 255, g: 192, b: 203 };
    
    let scheduleData = [], allDates = [], currentFileName = '';
    let shiftColors = { ...defaultShiftColors };
    let scheduleYear = 2025, scheduleMonth = 1, weekStartDay = 1;
    let isSummaryCollapsed = true;
    let globalSpecialShifts = new Set(); // 所有出現過的特殊班型(跨人員)
    
    const STORAGE_KEYS = { SCHEDULE_DATA:'scheduleData_v3', ALL_DATES:'allDates_v3', FILE_NAME:'fileName_v3', TIMESTAMP:'ts_v3', SHIFT_COLORS:'shiftColors_v3', WEEK_START_DAY:'weekStartDay_v3', SPECIAL_SHIFTS:'specialShifts_v3' };

    // 取得班型開始時間(分鐘) 用於排序
    function getShiftStartMinutes(shiftCode) {
        if (holidayShifts.includes(shiftCode)) return 99999;
        const desc = shiftDescriptions[shiftCode];
        if (desc && desc.includes('~')) {
            let start = desc.split('~')[0].trim();
            let [hour, minute] = start.split(':').map(Number);
            return hour * 60 + minute;
        }
        // 特殊班型給予一個較大時間，排在上班組末尾、休假之前
        return 23*60+59;
    }
    
    // 根據實際出現的班型列表排序 (上班組按時間，休假組最後)
    function getSortedShiftListForPerson(shiftCodesSet) {
        let workShifts = [], holidayList = [];
        for (let s of shiftCodesSet) {
            if (holidayShifts.includes(s)) holidayList.push(s);
            else workShifts.push(s);
        }
        workShifts.sort((a,b) => getShiftStartMinutes(a) - getShiftStartMinutes(b));
        holidayList.sort();
        return [...workShifts, ...holidayList];
    }
    
    // 重新整理特殊班型 (全局收集，並為新特殊班型設粉紅色)
    function refreshSpecialShiftsFromData() {
        let found = new Set();
        for (let person of scheduleData) {
            for (let dateKey in person.shifts) {
                let shiftCode = person.shifts[dateKey].shift;
                if (shiftCode && !shiftDescriptions[shiftCode]) found.add(shiftCode);
            }
        }
        globalSpecialShifts = found;
        // 為新特殊班型設定預設粉紅色
        for (let s of globalSpecialShifts) {
            if (!shiftColors[s]) {
                shiftColors[s] = { ...SPECIAL_DEFAULT_COLOR };
            }
        }
        // 移除已不存在的特殊班型顏色記錄
        for (let key in shiftColors) {
            if (!shiftDescriptions[key] && !globalSpecialShifts.has(key)) {
                delete shiftColors[key];
            }
        }
        localStorage.setItem(STORAGE_KEYS.SPECIAL_SHIFTS, JSON.stringify([...globalSpecialShifts]));
        saveColorSettingsToLocal();
    }
    
    function saveColorSettingsToLocal() { localStorage.setItem(STORAGE_KEYS.SHIFT_COLORS, JSON.stringify(shiftColors)); }
    
    // 動態產生顏色設定區域，只顯示當前人員擁有的特殊班型
    function createColorSettingsForPerson(specialShiftsOfCurrentPerson) {
        const container = document.getElementById('colorSettingsContainer');
        if (!container) return;
        container.innerHTML = '';
        
        // 預定義班型 (全部顯示，按時間排序)
        let predefinedShifts = Object.keys(shiftDescriptions);
        let workPre = predefinedShifts.filter(s => !holidayShifts.includes(s));
        let holidayPre = predefinedShifts.filter(s => holidayShifts.includes(s));
        workPre.sort((a,b) => getShiftStartMinutes(a) - getShiftStartMinutes(b));
        holidayPre.sort();
        
        function addShiftItem(shift, isSpecial = false) {
            const color = shiftColors[shift] || { r:128,g:128,b:128 };
            const desc = shiftDescriptions[shift] || (isSpecial ? '特殊班型' : '');
            const item = document.createElement('div');
            item.className = 'color-setting-item';
            item.innerHTML = `<div class="shift-label">${shift}</div><div class="time-label">${desc}</div>
                <div class="color-preview" id="preview_${shift}" style="background:rgb(${color.r},${color.g},${color.b})"></div>
                <div class="color-input-group"><div><span class="badge bg-secondary">R</span><input type="number" min="0" max="255" class="form-control form-control-sm color-input" data-shift="${shift}" data-type="r" value="${color.r}"></div>
                <div><span class="badge bg-secondary">G</span><input type="number" min="0" max="255" class="form-control form-control-sm color-input" data-shift="${shift}" data-type="g" value="${color.g}"></div>
                <div><span class="badge bg-secondary">B</span><input type="number" min="0" max="255" class="form-control form-control-sm color-input" data-shift="${shift}" data-type="b" value="${color.b}"></div></div>`;
            container.appendChild(item);
            const inputs = item.querySelectorAll('.color-input');
            inputs.forEach(inp => inp.addEventListener('input', (e) => {
                let shiftCode = inp.dataset.shift, type = inp.dataset.type;
                let val = parseInt(inp.value) || 0;
                if (val<0) val=0; if(val>255) val=255;
                if (!shiftColors[shiftCode]) shiftColors[shiftCode]={r:128,g:128,b:128};
                shiftColors[shiftCode][type]=val;
                document.getElementById(`preview_${shiftCode}`).style.backgroundColor=`rgb(${shiftColors[shiftCode].r},${shiftColors[shiftCode].g},${shiftColors[shiftCode].b})`;
                saveColorSettingsToLocal();
                updateScheduleWithNewColors();
            }));
        }
        
        // 預設班型（上班組）
        for (let w of workPre) addShiftItem(w);
        // 上班組與休假組之間的紅線
        if (workPre.length && holidayPre.length) {
            let hr = document.createElement('hr');
            hr.style.borderTop = '3px solid #ff0000';
            hr.style.margin = '12px 0';
            container.appendChild(hr);
        }
        // 預設休假班型
        for (let h of holidayPre) addShiftItem(h);
        
        // 特殊班型部分 (僅當目前人員有特殊班型才顯示)
        if (specialShiftsOfCurrentPerson && specialShiftsOfCurrentPerson.length > 0) {
            let specialHr = document.createElement('hr');
            specialHr.style.borderTop = '3px solid #ff0000';
            specialHr.style.margin = '16px 0';
            container.appendChild(specialHr);
            let specialTitle = document.createElement('div');
            specialTitle.className = 'fw-bold mb-2 text-secondary'; specialTitle.innerText = '✨ 特殊班型 (僅顯示於此人員)';
            container.appendChild(specialTitle);
            let sortedSpecial = [...specialShiftsOfCurrentPerson].sort();
            for (let sp of sortedSpecial) {
                addShiftItem(sp, true);
            }
        }
        
        document.getElementById('colorSettingsSection').style.display = 'block';
    }
    
    function updateScheduleWithNewColors() { 
        let selected = document.getElementById('personSelect').value;
        if(selected) showSelectedPersonSchedule();
    }
    
    // 班表統計 (僅顯示該人員實際出現的班型)
    function createPersonShiftSummary(personData) {
        const container = document.getElementById('shiftSummaryContent');
        if(!container) return;
        container.innerHTML = '';
        const daysInMonth = new Date(scheduleYear, scheduleMonth, 0).getDate();
        let workDays = 0, holidayDays = 0;
        let shiftCounts = {};
        let presentShiftsSet = new Set();
        for(let d=1; d<=daysInMonth; d++) {
            let sd = personData.shifts[d];
            if(sd) {
                let code = sd.shift;
                shiftCounts[code] = (shiftCounts[code]||0)+1;
                presentShiftsSet.add(code);
                if(holidayShifts.includes(code)) holidayDays++;
                else workDays++;
            }
        }
        let infoDiv = document.createElement('div');
        infoDiv.className = 'alert alert-secondary p-2 mb-3';
        infoDiv.innerHTML = `<strong>📊 上班天數: ${workDays} 天</strong> &nbsp;| <strong>🌙 休假天數: ${holidayDays} 天</strong> &nbsp;| 總天數: ${workDays+holidayDays} 天`;
        container.appendChild(infoDiv);
        
        // 取得排序後的班型列表 (只針對該人員出現的班型)
        const sortedShifts = getSortedShiftListForPerson(presentShiftsSet);
        let workGroup = sortedShifts.filter(s => !holidayShifts.includes(s));
        let holidayGroup = sortedShifts.filter(s => holidayShifts.includes(s));
        
        function appendShiftItem(shift) {
            let cnt = shiftCounts[shift] || 0;
            if(cnt===0) return;
            let color = shiftColors[shift] || {r:128,g:128,b:128};
            let item = document.createElement('div');
            item.className = 'summary-item';
            item.style.borderLeftColor = `rgb(${color.r},${color.g},${color.b})`;
            let desc = shiftDescriptions[shift] || (globalSpecialShifts.has(shift) ? '特殊班型' : '');
            item.innerHTML = `<span class="summary-shift">${shift} ${desc}</span><span class="summary-count">${cnt} 天</span>`;
            container.appendChild(item);
        }
        
        for(let w of workGroup) appendShiftItem(w);
        if(workGroup.length && holidayGroup.length) {
            let divider = document.createElement('div');
            divider.className = 'shift-divider-red';
            container.appendChild(divider);
        }
        for(let h of holidayGroup) appendShiftItem(h);
        
        let totalItem = document.createElement('div');
        totalItem.className = 'summary-item mt-2';
        totalItem.style.borderTop = '2px solid #4361ee';
        totalItem.innerHTML = `<span class="summary-shift fw-bold">總計 (上班+休假)</span><span class="summary-count fw-bold">${workDays+holidayDays} 天</span>`;
        container.appendChild(totalItem);
    }
    
    // 週曆繪製
    function createWeeklyCalendar(personData) {
        const tbody = document.getElementById('weeklyCalendarBody');
        if(!tbody) return;
        tbody.innerHTML = '';
        updateWeekHeaderUI();
        const daysInMonth = new Date(scheduleYear, scheduleMonth, 0).getDate();
        const firstDay = new Date(scheduleYear, scheduleMonth-1, 1).getDay();
        let emptyBefore = (weekStartDay===0) ? firstDay : (firstDay===0?6:firstDay-1);
        for(let week=0; week<6; week++) {
            let row = document.createElement('tr');
            for(let col=0; col<7; col++) {
                let idx = week*7+col;
                let dateNum = idx - emptyBefore + 1;
                let td = document.createElement('td');
                td.className = 'day-cell';
                let today = new Date();
                if(scheduleYear===today.getFullYear() && scheduleMonth===today.getMonth()+1 && dateNum===today.getDate()) td.classList.add('today');
                if(dateNum>=1 && dateNum<=daysInMonth) {
                    let dateObj = new Date(scheduleYear, scheduleMonth-1, dateNum);
                    let isWeekend = (dateObj.getDay()===0 || dateObj.getDay()===6);
                    if(isWeekend) td.classList.add('weekend');
                    let dateDiv = document.createElement('div'); dateDiv.className='day-date'; dateDiv.textContent=dateNum;
                    td.appendChild(dateDiv);
                    let shiftData = personData.shifts[dateNum];
                    if(shiftData) {
                        let code = shiftData.shift;
                        let col = shiftColors[code] || {r:128,g:128,b:128};
                        td.style.backgroundColor = `rgba(${col.r},${col.g},${col.b},0.35)`;
                        let shiftDiv = document.createElement('div'); shiftDiv.className='day-shift'; shiftDiv.textContent = shiftData.originalShift || code;
                        td.appendChild(shiftDiv);
                        if(shiftDescriptions[code]) {
                            let timeDiv = document.createElement('div'); timeDiv.className='day-shift-time'; timeDiv.textContent=shiftDescriptions[code];
                            td.appendChild(timeDiv);
                        }
                    } else { td.style.backgroundColor='#f8f9fa'; let emptyDiv=document.createElement('div'); emptyDiv.className='day-empty'; emptyDiv.textContent='-'; td.appendChild(emptyDiv); }
                    td.addEventListener('click', (e) => { e.stopPropagation(); openShiftPicker(dateNum, personData); });
                } else { td.classList.add('empty'); td.style.backgroundColor='#f1f3f5'; td.innerHTML='<div></div>'; }
                row.appendChild(td);
            }
            tbody.appendChild(row);
        }
    }
    function updateWeekHeaderUI() {
        const thead = document.getElementById('weekHeader');
        if(!thead) return;
        thead.innerHTML='';
        let headerRow = document.createElement('tr');
        let days = (weekStartDay===0) ? ['週日','週一','週二','週三','週四','週五','週六'] : ['週一','週二','週三','週四','週五','週六','週日'];
        days.forEach(day=>{ let th=document.createElement('th'); th.className='weekday-header'; th.textContent=day; headerRow.appendChild(th); });
        thead.appendChild(headerRow);
    }
    
    // 彈窗修改班型 (支援新增特殊班型)
    function openShiftPicker(dateNum, personData) {
        let allPossibleShifts = [...Object.keys(shiftDescriptions), ...globalSpecialShifts];
        allPossibleShifts = [...new Set(allPossibleShifts)];
        let sorted = getSortedShiftListForPerson(new Set(allPossibleShifts));
        let modalHtml = `
        <div class="modal fade" id="shiftModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">修改 ${scheduleYear}/${scheduleMonth}/${dateNum} 班型</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body" style="max-height:400px;overflow-y:auto;"><div class="d-flex flex-wrap gap-2" id="shiftOptionsContainer"></div></div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button></div></div></div></div>`;
        let existingModal = document.getElementById('shiftModal');
        if(existingModal) existingModal.remove();
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        let modalElem = document.getElementById('shiftModal');
        let bsModal = new bootstrap.Modal(modalElem);
        let containerDiv = document.getElementById('shiftOptionsContainer');
        sorted.forEach(shift => {
            let btn = document.createElement('button');
            btn.className = 'btn btn-outline-primary btn-sm shift-option-btn';
            btn.textContent = `${shift} ${shiftDescriptions[shift]||(globalSpecialShifts.has(shift)?'特殊班型':'')}`;
            btn.style.margin = '4px';
            btn.onclick = () => {
                // 更新班型
                let newOriginal = shift;
                let isHoliday = holidayShifts.includes(shift);
                personData.shifts[dateNum] = { shift: shift, originalShift: shift, isHoliday: isHoliday };
                // 若班型為特殊且尚未記錄
                if(!shiftDescriptions[shift] && !globalSpecialShifts.has(shift)) {
                    globalSpecialShifts.add(shift);
                    if(!shiftColors[shift]) shiftColors[shift] = { ...SPECIAL_DEFAULT_COLOR };
                    localStorage.setItem(STORAGE_KEYS.SPECIAL_SHIFTS, JSON.stringify([...globalSpecialShifts]));
                    saveColorSettingsToLocal();
                }
                saveToLocalStorage(scheduleData, allDates, currentFileName);
                showSelectedPersonSchedule(); // 刷新顯示
                bsModal.hide();
                setTimeout(()=>modalElem.remove(),300);
            };
            containerDiv.appendChild(btn);
        });
        bsModal.show();
        modalElem.addEventListener('hidden.bs.modal',()=>{ if(modalElem) modalElem.remove(); });
    }
    
    function showSelectedPersonSchedule() {
        let name = document.getElementById('personSelect').value;
        if(!name) return;
        let person = scheduleData.find(p=>p.name===name);
        if(!person) return;
        document.getElementById('selectedPersonInfo').innerHTML = `<h5><i class="bi bi-person-check"></i> 查詢：${name}</h5>`;
        document.getElementById('selectedPersonInfo').style.display='block';
        document.getElementById('personNameDisplay').textContent=name;
        document.getElementById('monthDisplay').textContent=`${scheduleYear}年${scheduleMonth}月`;
        document.getElementById('personInfoCard').style.display='block';
        document.getElementById('personWeeklyCalendar').style.display='block';
        document.getElementById('personShiftSummary').style.display='block';
        document.getElementById('actionButtons').style.display='flex';
        createWeeklyCalendar(person);
        createPersonShiftSummary(person);
        
        // 動態產生顏色設定區域: 只顯示該人員擁有的特殊班型
        let personSpecialShifts = new Set();
        for (let d in person.shifts) {
            let code = person.shifts[d].shift;
            if (!shiftDescriptions[code]) personSpecialShifts.add(code);
        }
        createColorSettingsForPerson([...personSpecialShifts]);
    }
    
    function copyPersonScheduleToClipboard() {
        let name = document.getElementById('personSelect').value;
        if(!name) return;
        let person = scheduleData.find(p=>p.name===name);
        if(!person) return;
        let lines = [`${name} - ${scheduleYear}年${scheduleMonth}月班表`,'日期\t星期\t班型\t說明'];
        const daysInMonth = new Date(scheduleYear, scheduleMonth, 0).getDate();
        for(let d=1;d<=daysInMonth;d++) {
            let sd = person.shifts[d];
            let shiftCode = sd?sd.shift:'無';
            let desc = sd? (shiftDescriptions[shiftCode]||'') : '';
            let dateObj = new Date(scheduleYear, scheduleMonth-1, d);
            let week = ['日','一','二','三','四','五','六'][dateObj.getDay()];
            lines.push(`${d}日\t星期${week}\t${shiftCode}\t${desc}`);
        }
        navigator.clipboard.writeText(lines.join('\n')).then(()=>{document.getElementById('copyNotification').classList.add('show'); setTimeout(()=>document.getElementById('copyNotification').classList.remove('show'),1500);});
    }
    
    function downloadScheduleAsImage() {
        let name = document.getElementById('personSelect').value;
        if(!name) return;
        let container = document.createElement('div');
        container.style.position='fixed'; container.style.left='-9999px'; container.style.top='-9999px';
        container.style.width='1000px'; container.style.backgroundColor='white'; container.style.padding='30px';
        let title = document.createElement('h3'); title.textContent=`${name} - ${scheduleYear}年${scheduleMonth}月班表`; title.style.textAlign='center';
        container.appendChild(title);
        let table = document.createElement('table'); table.style.width='100%'; table.style.borderCollapse='collapse'; table.style.border='1px solid #ddd';
        let thead = document.createElement('thead'); let tr = document.createElement('tr');
        let daysHeader = (weekStartDay===0)?['週日','週一','週二','週三','週四','週五','週六']:['週一','週二','週三','週四','週五','週六','週日'];
        daysHeader.forEach(d=>{let th=document.createElement('th'); th.textContent=d; th.style.padding='12px'; th.style.backgroundColor='#4361ee'; th.style.color='white'; tr.appendChild(th);});
        thead.appendChild(tr); table.appendChild(thead);
        let person = scheduleData.find(p=>p.name===name);
        let daysInMonth = new Date(scheduleYear, scheduleMonth, 0).getDate();
        let firstDay = new Date(scheduleYear, scheduleMonth-1, 1).getDay();
        let emptyBefore = (weekStartDay===0)?firstDay:(firstDay===0?6:firstDay-1);
        let tbody = document.createElement('tbody');
        for(let w=0;w<6;w++) {
            let row = document.createElement('tr');
            for(let c=0;c<7;c++) {
                let dateNum = w*7+c - emptyBefore + 1;
                let td = document.createElement('td'); td.style.border='1px solid #ddd'; td.style.padding='12px'; td.style.verticalAlign='top'; td.style.height='100px';
                if(dateNum>=1 && dateNum<=daysInMonth) {
                    td.innerHTML = `<div style="font-weight:bold;font-size:1.2rem;">${dateNum}</div>`;
                    let sd = person.shifts[dateNum];
                    if(sd) {
                        let col = shiftColors[sd.shift]||{r:128,g:128,b:128};
                        td.style.backgroundColor = `rgba(${col.r},${col.g},${col.b},0.25)`;
                        td.innerHTML += `<div><strong>${sd.originalShift||sd.shift}</strong></div>`;
                        if(shiftDescriptions[sd.shift]) td.innerHTML += `<div style="font-size:0.75rem;">${shiftDescriptions[sd.shift]}</div>`;
                    }
                } else { td.innerHTML=''; td.style.backgroundColor='#f5f5f5'; }
                row.appendChild(td);
            }
            tbody.appendChild(row);
        }
        table.appendChild(tbody); container.appendChild(table);
        document.body.appendChild(container);
        html2canvas(container,{scale:2}).then(canvas=>{let link=document.createElement('a'); link.download=`${name}_班表.png`; link.href=canvas.toDataURL(); link.click(); document.body.removeChild(container);}).catch(()=>{alert('下載失敗'); document.body.removeChild(container);});
    }
    
    // Excel 解析 (保持原有邏輯，並收集特殊班型)
    function parseWorkbook(workbook, fileName) {
        scheduleData=[]; allDates=[];
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        let json = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
        if(json.length<3) { showError('格式錯誤'); return; }
        scheduleYear = new Date().getFullYear(); scheduleMonth = new Date().getMonth()+1;
        let topLeft = json[0]?.[0]||'';
        let match = topLeft.match(/(\d{4})\s*年\s*(\d{1,2})\s*月/);
        if(match) { scheduleYear=parseInt(match[1]); scheduleMonth=parseInt(match[2]); }
        let dateRowIdx=1;
        for(let i=0;i<Math.min(12,json.length);i++){ let row=json[i]; if(row && row.filter(c=>typeof c==='number' && c>=1 && c<=31).length>=7){dateRowIdx=i; break;} }
        let dateRow = json[dateRowIdx];
        allDates=[];
        for(let c=3;c<=33;c++){ let v=dateRow[c]; if(v && !isNaN(Number(v)) && Number(v)>=1 && Number(v)<=31){ let d=Number(v); let dateObj=new Date(scheduleYear,scheduleMonth-1,d); allDates.push({colIndex:c,date:d,dayOfWeekNum:dateObj.getDay()}); } }
        allDates.sort((a,b)=>a.date-b.date);
        for(let r=dateRowIdx+1; r<json.length; r++){
            let row=json[r]; if(!row || row.length<3) continue;
            let name = row[2] ? String(row[2]).trim() : '';
            if(!name || name.length<2 || ['姓名','Name','人員','日期'].includes(name)) continue;
            let shifts={};
            let hasData=false;
            for(let dateInfo of allDates){
                let cell=row[dateInfo.colIndex];
                if(cell && String(cell).trim()!==''){
                    let raw=String(cell).trim();
                    if(raw.startsWith('=')) continue;
                    let code = raw.split('/')[0].split('／')[0].trim();
                    if(code.endsWith('.')) code=code.slice(0,-1);
                    let isHoliday = holidayShifts.includes(code) || /休|假|公|福|體/.test(code);
                    shifts[dateInfo.date] = { shift: code, originalShift: raw, isHoliday: isHoliday };
                    hasData=true;
                }
            }
            if(hasData) scheduleData.push({name:name, shifts:shifts});
        }
        if(!scheduleData.length) { showError('無效班表資料'); return; }
        refreshSpecialShiftsFromData();
        saveToLocalStorage(scheduleData, allDates, fileName);
        updatePersonSelect();
        // 不立刻 createColorSettingsForPerson，等選中人員後再產生
        updateWeekStartSelector();
        hideLoading();
        document.getElementById('fileInfo').style.display='none';
        if(scheduleData.length) { let sel=document.getElementById('personSelect'); sel.selectedIndex=1; showSelectedPersonSchedule(); }
    }
    function updatePersonSelect() { let sel=document.getElementById('personSelect'); sel.innerHTML='<option value="">請選擇人員</option>'; scheduleData.forEach(p=>{let opt=document.createElement('option'); opt.value=p.name; opt.textContent=p.name; sel.appendChild(opt);}); }
    function updateWeekStartSelector() { let wSel=document.getElementById('weekStartSelector'); wSel.style.display='block'; let select=document.getElementById('weekStartDaySelect'); select.value=weekStartDay; select.onchange=()=>{weekStartDay=parseInt(select.value); localStorage.setItem(STORAGE_KEYS.WEEK_START_DAY,weekStartDay); showSelectedPersonSchedule();}; }
    function saveToLocalStorage(sdata,dates,fname){ localStorage.setItem(STORAGE_KEYS.SCHEDULE_DATA,JSON.stringify(sdata)); localStorage.setItem(STORAGE_KEYS.ALL_DATES,JSON.stringify(dates)); localStorage.setItem(STORAGE_KEYS.FILE_NAME,fname); localStorage.setItem(STORAGE_KEYS.TIMESTAMP,Date.now().toString()); saveColorSettingsToLocal(); localStorage.setItem(STORAGE_KEYS.WEEK_START_DAY,weekStartDay); localStorage.setItem(STORAGE_KEYS.SPECIAL_SHIFTS,JSON.stringify([...globalSpecialShifts])); }
    function loadFromLocalStorage(){ let sData=localStorage.getItem(STORAGE_KEYS.SCHEDULE_DATA); if(!sData) return null; try{ scheduleData=JSON.parse(sData); allDates=JSON.parse(localStorage.getItem(STORAGE_KEYS.ALL_DATES)); currentFileName=localStorage.getItem(STORAGE_KEYS.FILE_NAME)||''; let cols=localStorage.getItem(STORAGE_KEYS.SHIFT_COLORS); if(cols) shiftColors=JSON.parse(cols); let wd=localStorage.getItem(STORAGE_KEYS.WEEK_START_DAY); if(wd) weekStartDay=parseInt(wd); let sp=localStorage.getItem(STORAGE_KEYS.SPECIAL_SHIFTS); if(sp) globalSpecialShifts=new Set(JSON.parse(sp)); for(let s of globalSpecialShifts) if(!shiftColors[s]) shiftColors[s]={...SPECIAL_DEFAULT_COLOR}; return true; }catch(e){return null;} }
    function clearLocalStorage(){ Object.values(STORAGE_KEYS).forEach(k=>localStorage.removeItem(k)); location.reload(); }
    function showLoading(){ document.getElementById('loadingSpinner').style.display='block'; document.getElementById('resultSection').style.display='none'; }
    function hideLoading(){ document.getElementById('loadingSpinner').style.display='none'; document.getElementById('resultSection').style.display='block'; }
    function showError(msg){ let errDiv=document.getElementById('errorMessage'); errDiv.innerHTML=`<i class="bi bi-exclamation-triangle"></i> ${msg}`; errDiv.style.display='block'; hideLoading(); }
    function handleFile(file){ if(!file) return; showLoading(); let reader=new FileReader(); reader.onload=e=>{ let wb=XLSX.read(e.target.result,{type:'binary'}); parseWorkbook(wb,file.name); }; reader.readAsBinaryString(file); }
    
    document.addEventListener('DOMContentLoaded',()=>{
        if(loadFromLocalStorage()){ updatePersonSelect(); updateWeekStartSelector(); document.getElementById('resultSection').style.display='block'; if(scheduleData.length){ let sel=document.getElementById('personSelect'); sel.selectedIndex=1; showSelectedPersonSchedule();} }
        document.getElementById('selectFileBtn').onclick=()=>document.getElementById('fileInput').click();
        document.getElementById('fileInput').onchange=e=>{ if(e.target.files[0]) handleFile(e.target.files[0]); e.target.value=''; };
        document.getElementById('reuploadBtn').onclick=()=>document.getElementById('fileInput').click();
        document.getElementById('clearStorageBtn').onclick=()=>{ if(confirm('清除所有本地資料？')) clearLocalStorage(); };
        document.getElementById('copyPersonScheduleBtn').onclick=copyPersonScheduleToClipboard;
        document.getElementById('copyPersonScheduleBtn2').onclick=copyPersonScheduleToClipboard;
        document.getElementById('downloadImageBtn').onclick=downloadScheduleAsImage;
        document.getElementById('summaryToggleBtn').onclick=()=>{ isSummaryCollapsed=!isSummaryCollapsed; let cont=document.getElementById('shiftSummaryContent'); if(isSummaryCollapsed) cont.classList.add('collapsed'); else cont.classList.remove('collapsed'); };
        document.getElementById('toggleColorSettingsBtn').onclick=()=>{ let sec=document.getElementById('colorSettingsSection'); sec.style.display=sec.style.display==='none'?'block':'none'; };
        document.getElementById('toggleColorSettingsBtn2').onclick=()=>{ let sec=document.getElementById('colorSettingsSection'); sec.style.display=sec.style.display==='none'?'block':'none'; };
        document.getElementById('saveColorsBtn').onclick=()=>{ saveColorSettingsToLocal(); alert('顏色已儲存'); };
        document.getElementById('resetColorsBtn').onclick=()=>{ if(confirm('重設所有班型顏色為預設值？')){ shiftColors=JSON.parse(JSON.stringify(defaultShiftColors)); for(let s of globalSpecialShifts) shiftColors[s]={...SPECIAL_DEFAULT_COLOR}; saveColorSettingsToLocal(); showSelectedPersonSchedule();} };
        document.getElementById('personSelect').onchange=()=>showSelectedPersonSchedule();
    });
</script>
